<h2 mat-dialog-title class="!text-base !font-semibold !text-slate-800">
  {{ esEdicion ? 'Editar usuario' : 'Nuevo usuario' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="grid grid-cols-1 gap-x-4 sm:grid-cols-2">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" />
      <mat-error *ngIf="form.controls.nombre.hasError('required')">El nombre es obligatorio.</mat-error>
      <mat-error *ngIf="form.controls.nombre.hasError('minlength')">Ingresá al menos 2 caracteres.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Apellido</mat-label>
      <input matInput formControlName="apellido" />
      <mat-error *ngIf="form.controls.apellido.hasError('required')">El apellido es obligatorio.</mat-error>
      <mat-error *ngIf="form.controls.apellido.hasError('minlength')">Ingresá al menos 2 caracteres.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full sm:col-span-2">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" placeholder="usuario&#64;dentalcare.com" />
      <mat-error *ngIf="form.controls.email.hasError('required')">El email es obligatorio.</mat-error>
      <mat-error *ngIf="form.controls.email.hasError('email')">Ingresá un email válido.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="rol">
        <mat-option *ngFor="let entrada of rolesDisponibles" [value]="entrada[0]">{{ entrada[1] }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="flex items-center">
      <mat-slide-toggle formControlName="activo">Usuario activo</mat-slide-toggle>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="guardar()">
    {{ esEdicion ? 'Guardar cambios' : 'Crear usuario' }}
  </button>
</mat-dialog-actions>
