<div class="flex flex-col gap-4">
  <div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-center">
    <div>
      <h1 class="text-xl font-semibold text-slate-800">Agenda de turnos</h1>
      <p class="text-sm text-slate-500">Hacé clic en un día para crear un turno, o en un turno existente para editarlo.</p>
    </div>
    <button mat-flat-button color="primary" (click)="abrirNuevoTurno()" class="!flex !items-center !gap-2">
      <span class="material-symbols-outlined text-[18px]">event</span>
      Nuevo turno
    </button>
  </div>

  <!-- Referencia de colores por estado -->
  <div class="app-card flex flex-wrap items-center gap-4 p-3">
    <span class="text-xs font-medium text-slate-500">Estados:</span>
    <div *ngFor="let entrada of leyendaEstados" class="flex items-center gap-1.5">
      <span class="h-2.5 w-2.5 rounded-full" [style.backgroundColor]="colorEstado[entrada[0]]"></span>
      <span class="text-xs text-slate-600">{{ entrada[1].label }}</span>
    </div>
  </div>

  <div class="app-card p-4">
    <full-calendar [options]="calendarOptions()" />
  </div>
</div>
