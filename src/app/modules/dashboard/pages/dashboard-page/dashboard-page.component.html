<div class="flex flex-col gap-6">
  <div>
    <h1 class="text-xl font-semibold text-slate-800">Dashboard</h1>
    <p class="text-sm text-slate-500">Resumen general del consultorio, hoy.</p>
  </div>

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
    <app-kpi-card *ngFor="let kpi of kpis" [kpi]="kpi" />
  </div>

  <div class="grid grid-cols-1 gap-4 xl:grid-cols-3">
    <div class="xl:col-span-2">
      <app-chart-card [config]="graficoIngresos" />
    </div>
    <div class="xl:col-span-1">
      <app-chart-card [config]="graficoTurnosPorEstado" />
    </div>
  </div>

  <div class="grid grid-cols-1 gap-4 xl:grid-cols-3">
    <app-proximos-turnos [turnos]="proximosTurnos" />
    <app-pacientes-recientes [pacientes]="pacientesRecientes" />
    <app-actividad-reciente [actividades]="actividadReciente" />
  </div>
</div>
