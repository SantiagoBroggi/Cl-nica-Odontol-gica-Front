<div class="app-card flex h-full flex-col p-5">
  <div class="mb-3 flex items-center justify-between">
    <h3 class="text-sm font-semibold text-slate-800">Próximos turnos</h3>
    <a routerLink="/turnos" class="text-xs font-medium text-brand-600 hover:underline">Ver agenda</a>
  </div>

  <ul class="flex flex-col divide-y divide-surface-border">
    <li *ngFor="let turno of turnos" class="flex items-center gap-3 py-3 first:pt-0 last:pb-0">
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-brand-100 text-xs font-semibold text-brand-700">
        {{ turno.pacienteIniciales }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-medium text-slate-800">{{ turno.pacienteNombre }}</p>
        <p class="truncate text-xs text-slate-500">{{ turno.motivo }} · {{ turno.profesional }}</p>
      </div>
      <div class="flex shrink-0 flex-col items-end gap-1">
        <span class="text-xs font-medium text-slate-700">{{ turno.fechaHora | date: 'HH:mm' }}</span>
        <app-estado-turno-badge [estado]="turno.estado" />
      </div>
    </li>
    <li *ngIf="turnos.length === 0" class="py-6 text-center text-sm text-slate-400">
      No hay turnos programados próximamente.
    </li>
  </ul>
</div>
