<div class="flex flex-col gap-6">
  <div>
    <h1 class="text-xl font-semibold text-slate-800">Odontograma</h1>
    <p class="text-sm text-slate-500">Buscá un paciente para ver su odontograma.</p>
  </div>

  <mat-form-field appearance="outline" class="w-full sm:max-w-sm" subscriptSizing="dynamic">
    <mat-label>Buscar por nombre, DNI o teléfono</mat-label>
    <input matInput (input)="onBuscar($any($event.target).value)" placeholder="Ej: Martina Gómez" />
    <span matPrefix class="material-symbols-outlined mr-2 text-[18px] text-slate-400">search</span>
  </mat-form-field>

  <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
    <button
      *ngFor="let paciente of pacientes()"
      type="button"
      (click)="irAOdontograma(paciente.id)"
      class="app-card flex items-center gap-3 p-4 text-left transition-colors hover:border-brand-300 hover:bg-brand-50"
    >
      <app-avatar-iniciales [iniciales]="iniciales(paciente)" [semilla]="paciente.id" [tamano]="40" />
      <div class="min-w-0">
        <p class="truncate font-medium text-slate-800">{{ nombreCompleto(paciente) }}</p>
        <p class="truncate text-xs text-slate-500">DNI {{ paciente.dni }}</p>
      </div>
    </button>

    <p *ngIf="pacientes().length === 0" class="col-span-full py-10 text-center text-sm text-slate-400">
      No se encontraron pacientes.
    </p>
  </div>
</div>
