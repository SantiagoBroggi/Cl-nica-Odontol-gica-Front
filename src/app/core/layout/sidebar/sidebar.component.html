<aside class="sidebar flex h-full w-64 flex-col bg-brand-800 text-white">
  <!-- Marca / logo del consultorio -->
  <div class="flex items-center gap-3 px-5 py-5 border-b border-white/10">
    <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-white/10">
      <span class="material-symbols-outlined text-brand-100">dentistry</span>
    </div>
    <div class="leading-tight">
      <p class="text-sm font-semibold tracking-wide">DentalCare Suite</p>
      <p class="text-xs text-brand-200">Gestión de Consultorio</p>
    </div>
  </div>

  <!-- Menú de navegación principal -->
  <nav class="flex-1 overflow-y-auto px-3 py-4">
    <ul class="flex flex-col gap-1">
      <li *ngFor="let item of items()">
        <a
          [routerLink]="item.route"
          routerLinkActive="nav-link-active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="nav-link group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-brand-100 transition-colors hover:bg-white/10 hover:text-white"
        >
          <span class="nav-link__icon material-symbols-outlined text-[20px] text-brand-200">{{ item.icon }}</span>
          <span class="flex-1">{{ item.label }}</span>
          <span
            *ngIf="item.badge"
            class="rounded-full bg-brand-500 px-2 py-0.5 text-[11px] font-semibold text-white"
          >{{ item.badge }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Pie del sidebar -->
  <div class="border-t border-white/10 px-5 py-4">
    <p class="text-[11px] text-brand-200">© {{ 2026 }} DentalCare Suite</p>
    <p class="text-[11px] text-brand-300">v0.1.0 · Panel interno</p>
  </div>
</aside>
